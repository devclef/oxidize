<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="/api/manifest">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxidize - Monthly Summary</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .summary-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .month-selector {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--card-shadow);
            flex-wrap: wrap;
        }
        .month-selector label {
            font-weight: 600;
            font-size: 1.1em;
        }
        .month-selector select {
            padding: 8px 12px;
            font-size: 1em;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-color);
            color: var(--text-color);
        }
        .account-selector {
            margin-bottom: 20px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--card-shadow);
        }
        .account-selector h3 {
            margin: 0 0 12px 0;
            font-size: 1em;
            color: var(--text-muted);
        }
        .account-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px;
            background: var(--bg-color);
        }
        .account-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 8px;
            cursor: pointer;
        }
        .account-item:hover {
            background: var(--card-bg);
            border-radius: 4px;
        }
        .account-item input[type="checkbox"] {
            cursor: pointer;
        }
        .account-actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }
        .account-actions button {
            padding: 6px 12px;
            font-size: 0.9em;
            cursor: pointer;
        }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .summary-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s;
        }
        .summary-card:hover {
            transform: translateY(-4px);
        }
        .summary-card h3 {
            margin: 0 0 12px 0;
            font-size: 0.9em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .summary-card .amount {
            font-size: 2em;
            font-weight: 700;
            margin: 0;
        }
        .summary-card.income .amount {
            color: #4caf50;
        }
        .summary-card.expenses .amount {
            color: #f44336;
        }
        .summary-card.savings .amount {
            color: #2196f3;
        }
        .summary-card.savings-rate .amount {
            color: #9c27b0;
            font-size: 1.5em;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: var(--text-muted);
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c62828;
        }
        .dark .error {
            background: #421818;
            color: #ef9a9a;
        }
        .nav {
            margin-bottom: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>
 <body>
 <script>if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('/static/sw.js'); }); }</script>
    <button id="theme-toggle" class="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">
        <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="display: none;">
            <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39-.39-1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39-.39-1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
        </svg>
        <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
        </svg>
    </button>
    <nav class="nav">
        <a href="/">Graph Builder</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/summary" class="active">Monthly Summary</a>
    </nav>
    
    <h1 class="text-center">Monthly Summary</h1>
    
    <div class="summary-container">
        <div class="month-selector">
            <label for="month-select">Month</label>
            <select id="month-select"></select>
            <label for="year-select">Year</label>
            <select id="year-select"></select>
        </div>

        <div id="error-container" class="error" style="display: none;"></div>

        <div class="account-selector">
            <h3>Account Type Filter</h3>
            <select id="account-type-filter">
                <option value="all">All Types</option>
            </select>
            <div class="account-actions">
                <button id="select-all-accounts">Select All</button>
                <button id="deselect-all-accounts">Deselect All</button>
            </div>
            <div class="account-list" id="account-list"></div>
        </div>

        <div class="summary-cards">
            <div class="summary-card income">
                <h3>Income</h3>
                <p class="amount" id="total-income">$0.00</p>
            </div>
            <div class="summary-card expenses">
                <h3>Expenses</h3>
                <p class="amount" id="total-expenses">$0.00</p>
            </div>
            <div class="summary-card savings">
                <h3>Savings</h3>
                <p class="amount" id="savings">$0.00</p>
            </div>
            <div class="summary-card savings-rate">
                <h3>Savings Rate</h3>
                <p class="amount" id="savings-rate">0.0%</p>
            </div>
        </div>
    </div>

<script>
    const THEME_KEY = 'oxidize_theme';

    function showSunIcon() {
        const sunIcon = document.getElementById('theme-icon-sun');
        const moonIcon = document.getElementById('theme-icon-moon');
        if (sunIcon) sunIcon.style.display = 'block';
        if (moonIcon) moonIcon.style.display = 'none';
    }

    function showMoonIcon() {
        const sunIcon = document.getElementById('theme-icon-sun');
        const moonIcon = document.getElementById('theme-icon-moon');
        if (sunIcon) sunIcon.style.display = 'none';
        if (moonIcon) moonIcon.style.display = 'block';
    }

    function initTheme() {
        const savedTheme = localStorage.getItem(THEME_KEY);
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.setAttribute('data-theme', 'dark');
            showMoonIcon();
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            showSunIcon();
        }
    }

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem(THEME_KEY, newTheme);

        if (newTheme === 'dark') {
            showMoonIcon();
        } else {
            showSunIcon();
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        initTheme();
        const themeToggle = document.getElementById('theme-toggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', toggleTheme);
        }
    });

    (async () => {
        const monthSelect = document.getElementById('month-select');
        const yearSelect = document.getElementById('year-select');
        const typeFilterSelect = document.getElementById("account-type-filter");
        const errorContainer = document.getElementById('error-container');
        
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth() + 1;

        // Populate year select
        for (let i = currentYear - 5; i <= currentYear + 5; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = i;
            if (i === currentYear) option.selected = true;
            yearSelect.appendChild(option);
        }

        // Populate month select
        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        for (let i = 1; i <= 12; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = months[i-1];
            if (i === currentMonth) option.selected = true;
            monthSelect.appendChild(option);
        }

        // Populate account type filter from CONFIG
        const config = window.OXIDIZE_CONFIG || { accountTypes: ["asset", "cash", "expense", "revenue", "liability"] };
        config.accountTypes.forEach(type => {
            const option = document.createElement("option");
            option.value = type;
            option.textContent = type.charAt(0).toUpperCase() + type.slice(1);
            typeFilterSelect.appendChild(option);
        });

        // Format currency
        function formatCurrency(amount, currencySymbol, currencyCode) {
            const symbol = currencySymbol || currencyCode || '$';
            return `${symbol}${amount.toFixed(2)}`;
        }

        // Fetch accounts
        async function fetchAccounts(types) {
            try {
                let url = '/api/accounts';
                if (types.length > 0 && !types.includes('all')) {
                    url += '?type=' + types.join(',');
                }
                const response = await fetch(url);
                if (!response.ok) throw new Error();
                return await response.json();
            } catch (error) {
                console.error('Failed to fetch accounts:', error);
                return [];
            }
        }

        // Render account list
        async function renderAccountList() {
            const selectedTypes = Array.from(typeFilterSelect.selectedOptions).map(opt => opt.value);
            const accountList = document.getElementById('account-list');
            accountList.innerHTML = '<div class="loading">Loading accounts...</div>';
            
            const accounts = await fetchAccounts(selectedTypes);
            
            if (accounts.length === 0) {
                accountList.innerHTML = '<div class="loading">No accounts found</div>';
                return;
            }
            
            accountList.innerHTML = accounts.map(account => `
                <div class="account-item">
                    <input type="checkbox" value="${account.id}" id="acc-${account.id}" class="account-checkbox">
                    <label for="acc-${account.id}">${account.name} (${account.account_type})</label>
                </div>
            `).join('');

            // Attach event listeners to new checkboxes
            document.querySelectorAll('.account-checkbox').forEach(cb => {
                cb.addEventListener('change', fetchChartData);
            });
        }

        // Get selected account IDs
        function getSelectedAccountIds() {
            const checkboxes = document.querySelectorAll('#account-list input[type="checkbox"]:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        // Fetch and render summary data
        async function fetchChartData() {
            const month = monthSelect.value;
            const year = yearSelect.value;
            const accountIds = getSelectedAccountIds();
            const selectedType = typeFilterSelect.value;
            
            const accountIdsParam = accountIds.length > 0 ? accountIds.join(',') : '';
            const accountTypeParam = selectedType && selectedType !== 'all' ? `&account_type=${selectedType}` : '';

            try {
                const url = `/api/summary/monthly?month=${month}&year=${year}${accountIdsParam ? '&account_ids=' + accountIdsParam : ''}${accountTypeParam}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                updateSummaryUI(data);
            } catch (error) {
                console.error('Failed to fetch summary:', error);
                errorContainer.textContent = 'Failed to fetch summary data.';
            }
        }

        function updateSummaryUI(data) {
            const currencySymbol = data.currency_symbol;
            const currencyCode = data.currency_code;

            document.getElementById('total-income').textContent = formatCurrency(data.total_income, currencySymbol, currencyCode);
            document.getElementById('total-expenses').textContent = formatCurrency(data.total_expenses, currencySymbol, currencyCode);
            document.getElementById('savings').textContent = formatCurrency(data.savings, currencySymbol, currencyCode);
            document.getElementById('savings-rate').textContent = (data.savings_rate * 100).toFixed(1) + '%';
        }

        // Event Listeners
        monthSelect.addEventListener('change', fetchChartData);
        yearSelect.addEventListener('change', fetchChartData);
        typeFilterSelect.addEventListener('change', renderAccountList);

        document.getElementById('select-all-accounts').addEventListener('click', () => {
            document.querySelectorAll('.account-checkbox').forEach(cb => cb.checked = true);
            fetchChartData();
        });

        document.getElementById('deselect-all-accounts').addEventListener('click', () => {
            document.querySelectorAll('.account-checkbox').forEach(cb => cb.checked = false);
            fetchChartData();
        });

        // Initial load
        await renderAccountList();
        fetchChartData();
    })();
</script>
</body>
</html>
