<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxidize - Monthly Summary</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .summary-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .month-selector {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: var(--card-shadow);
        }
        .month-selector label {
            font-weight: 600;
            font-size: 1.1em;
        }
        .month-selector select {
            padding: 8px 12px;
            font-size: 1em;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-color);
            color: var(--text-color);
        }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .summary-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s;
        }
        .summary-card:hover {
            transform: translateY(-4px);
        }
        .summary-card h3 {
            margin: 0 0 12px 0;
            font-size: 0.9em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .summary-card .amount {
            font-size: 2em;
            font-weight: 700;
            margin: 0;
        }
        .summary-card.income .amount {
            color: #4caf50;
        }
        .summary-card.expenses .amount {
            color: #f44336;
        }
        .summary-card.savings .amount {
            color: #2196f3;
        }
        .summary-card.savings-rate .amount {
            color: #9c27b0;
            font-size: 1.5em;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: var(--text-muted);
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c62828;
        }
        .dark .error {
            background: #421818;
            color: #ef9a9a;
        }
        .nav {
            margin-bottom: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <button id="theme-toggle" class="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">
        <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="display: none;">
            <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
        </svg>
        <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
        </svg>
    </button>
    <nav class="nav">
        <a href="/">Graph Builder</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/summary" class="active">Monthly Summary</a>
    </nav>
    
    <h1>Monthly Summary</h1>
    
    <div class="summary-container">
        <div class="month-selector">
            <label for="month-select">Month:</label>
            <select id="month-select">
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4">April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
            
            <label for="year-select">Year:</label>
            <select id="year-select">
            </select>
        </div>
        
        <div id="error-container"></div>
        
        <div class="summary-cards">
            <div class="summary-card income">
                <h3>Total Income</h3>
                <p class="amount" id="total-income">-</p>
            </div>
            <div class="summary-card expenses">
                <h3>Total Expenses</h3>
                <p class="amount" id="total-expenses">-</p>
            </div>
            <div class="summary-card savings">
                <h3>Savings</h3>
                <p class="amount" id="savings">-</p>
            </div>
            <div class="summary-card savings-rate">
                <h3>Savings Rate</h3>
                <p class="amount" id="savings-rate">-</p>
            </div>
        </div>
    </div>

    <script>
        // Theme toggle
        const themeToggle = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('theme-icon-sun');
        const moonIcon = document.getElementById('theme-icon-moon');
        
        function updateThemeIcons() {
            const isDark = document.body.classList.contains('dark');
            sunIcon.style.display = isDark ? 'block' : 'none';
            moonIcon.style.display = isDark ? 'none' : 'block';
        }
        
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.body.classList.add('dark');
            }
            updateThemeIcons();
        }
        
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcons();
        });
        
        initTheme();
        
        // Populate year selector
        const yearSelect = document.getElementById('year-select');
        const currentYear = new Date().getFullYear();
        for (let year = currentYear + 1; year >= currentYear - 10; year--) {
            const option = document.createElement('option');
            option.value = year;
            option.textContent = year;
            if (year === currentYear) {
                option.selected = true;
            }
            yearSelect.appendChild(option);
        }
        
        // Set current month
        const monthSelect = document.getElementById('month-select');
        monthSelect.value = new Date().getMonth() + 1;
        
        // Format currency
        function formatCurrency(amount, currencySymbol, currencyCode) {
            const symbol = currencySymbol || currencyCode || '$';
            return `${symbol}${amount.toFixed(2)}`;
        }
        
        // Fetch and display summary
        async function fetchSummary() {
            const month = monthSelect.value;
            const year = yearSelect.value;
            const errorContainer = document.getElementById('error-container');
            
            errorContainer.innerHTML = '';
            
            try {
                const response = await fetch(`/api/summary/monthly?month=${month}&year=${year}`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const summary = await response.json();
                
                document.getElementById('total-income').textContent = 
                    formatCurrency(summary.total_income, summary.currency_symbol, summary.currency_code);
                document.getElementById('total-expenses').textContent = 
                    formatCurrency(summary.total_expenses, summary.currency_symbol, summary.currency_code);
                document.getElementById('savings').textContent = 
                    formatCurrency(summary.savings, summary.currency_symbol, summary.currency_code);
                document.getElementById('savings-rate').textContent = 
                    `${summary.savings_rate.toFixed(1)}%`;
                    
            } catch (error) {
                errorContainer.innerHTML = `<div class="error">Error loading summary: ${error.message}</div>`;
                console.error('Failed to fetch summary:', error);
            }
        }
        
        // Event listeners
        monthSelect.addEventListener('change', fetchSummary);
        yearSelect.addEventListener('change', fetchSummary);
        
        // Initial fetch
        fetchSummary();
    </script>
</body>
</html>
