<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxidize - Firefly III Accounts</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Firefly III Account Balances</h1>
    <div class="controls">
        <label for="type-filter">Filter by account type:</label>
        <select id="type-filter" multiple size="6">
            <option value="all" selected>All</option>
            <option value="asset">Asset</option>
            <option value="cash">Cash</option>
            <option value="expense">Expense</option>
            <option value="revenue">Revenue</option>
            <option value="liability">Liability</option>
        </select>
        <button id="fetch-accounts-btn">Fetch Accounts</button>
    </div>
    <div class="account-section">
        <div class="account-section-header">
            <h3>Accounts</h3>
            <button id="toggle-accounts-btn" class="toggle-btn" style="display: none;">▼ Collapse</button>
        </div>
        <div id="accounts-content">
            <div class="account-actions">
                <button id="select-all-btn">Select All</button>
                <button id="deselect-all-btn">Deselect All</button>
            </div>
            <div id="app">
                <div class="loading">Loading accounts...</div>
            </div>
        </div>
    </div>

    <div class="saved-lists-container">
        <h3>Saved Account Lists</h3>
        <div class="saved-lists-controls">
            <input type="text" id="list-name-input" placeholder="List name">
            <button id="save-list-btn">Save Selection</button>
            <select id="saved-lists-select">
                <option value="">-- Select saved list --</option>
            </select>
            <button id="load-list-btn">Load</button>
            <button id="delete-list-btn">Delete</button>
        </div>
    </div>

    <div class="chart-container">
        <div class="chart-header">
            <h2>Account Balance History</h2>
            <div class="chart-controls">
                <label for="start-date">Start:</label>
                <input type="date" id="start-date">
                <label for="end-date">End:</label>
                <input type="date" id="end-date">
                <label for="interval-select">Interval:</label>
                <select id="interval-select">
                    <option value="auto">Auto</option>
                    <option value="1D">Day</option>
                    <option value="1W">Week</option>
                    <option value="1M">Month</option>
                    <option value="1Y">Year</option>
                </select>
                <button id="update-chart-btn">Update Graph</button>
            </div>
        </div>
        <div id="chart-error"></div>
        <div class="chart-wrapper">
            <canvas id="balanceChart"></canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
